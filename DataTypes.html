<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>




<body>

    


 <script>

    
        // =========================
        // JAVASCRIPT DATA TYPES
        // =========================

        // 1. String 
        let name = "Imam";          // Text values (" ", ' ')

        // 2. Number 
        let age = 22;               // Integers and decimals
        let price = 19.99;          // No separate int/float type

        // 3. BigInt 
        let bigNum = 12345678901234567890n; // Very large integers

        // 4. Boolean 
        let isOnline = true;        // true or false

        // 5. Undefined 
        let x;                      // Declared but not assigned, defaults to undefined

        // 6. Null 
        let y = null;               // Intentional empty value, also its typeof is object (js bug)

        // 7. Symbol 
        let id = Symbol("id");      // Unique identifiers

        // 8. Object 
        let user = {                // Collection of key-value pairs
        name: "Imam",
        age: 22
        };
  
        // 9. Array (Object type) ---
        let fruits = ["Apple", "Banana"]; // Ordered list

        // 10. Function (Object type but when u typeof it returns function)
        function greet() {          // Reusable block of code
        return "Hello";
        }

        // also NaN (Not a Number) is a special numeric value representing an invalid number
        let notANumber = NaN;
        // NaN is of type number not a separate type
        // also happened when u an operation expecting a number but gets something else
        let invalidNum = "abc" / 2; // results in NaN




        // NOTE:
        // JS has dynamic typing
        // Variable type can change
        let data = 10;              // Number
        data = "ten";               // String



 </script>
    
























</body>
    



</html>
