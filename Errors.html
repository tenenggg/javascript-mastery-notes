<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>


// ============================================
//     SPECIAL VALUES: NaN, undefined, null
// ============================================



// NaN (Not a Number)
// - Type: 'number'
// - Meaning: Invalid number from failed arithmetic
// - Unique: NaN !== NaN
// - Check: isNaN(value) or Number.isNaN(value)
let nan = 0/0;                     // NaN
let nan2 = Number("text");         // NaN
console.log(typeof NaN);          // 'number'
console.log(NaN === NaN);         // false





// undefined
// - Type: 'undefined' 
// - Meaning: Variable declared but no value assigned
// - Automatic: Uninitialized variables, missing params
// - Check: typeof value === 'undefined'
let x;
console.log(x);                   // undefined
function test(a) { console.log(a); }
test();                           // undefined





// null
// - Type: 'object' (historical bug)
// - Meaning: Intentional absence of value
// - Manual: Explicitly assigned
// - Check: value === null
let y = null;                     // Explicitly null
// document.getElementById("nonexistent"); // null (comment if not in browser)






// ============================================
//             JAVASCRIPT ERROR TYPES
// ============================================



// 1. TypeError
// - When: Operation on wrong type
// - Examples: Calling non-function, null property access

// WARNING: Uncommenting these lines will crash your page/script!
// null.property;                    // TypeError - UNCOMMENT TO SEE ERROR
// "string"();                       // TypeError - UNCOMMENT TO SEE ERROR




// 2. ReferenceError  
// - When: Accessing undefined variable
// - Examples: Undeclared variable, out of scope

// WARNING: Uncommenting these lines will crash your page/script!
// console.log(neverDeclared);       // ReferenceError - UNCOMMENT TO SEE ERROR




// 3. SyntaxError
// - When: Invalid JavaScript syntax
// - Examples: JSON.parse('invalid'), missing brackets

// WARNING: Uncommenting these lines will crash your page/script!
// const x = ;                      // SyntaxError - UNCOMMENT TO SEE ERROR
// JSON.parse('{invalid json}');    // SyntaxError - UNCOMMENT TO SEE ERROR




// 4. RangeError
// - When: Value outside valid range  
// - Examples: Invalid array length, recursion depth

// WARNING: Uncommenting these lines will crash your page/script!
// new Array(-1);                    // RangeError - UNCOMMENT TO SEE ERROR
// (10).toFixed(101);                // RangeError - UNCOMMENT TO SEE ERROR




// 5. URIError
// - When: Invalid URI operations
// - Examples: malformed URI in decodeURIComponent

// WARNING: Uncommenting these lines will crash your page/script!
// decodeURIComponent('%');          // URIError - UNCOMMENT TO SEE ERROR



// 6. EvalError (Rare)
// - When: eval() function problems
// - Deprecated in modern JS



// 7. AggregateError (ES2021)
// - When: Multiple errors in Promise.any()
// - Contains array of individual errors




// ============================================
//             ERROR OBJECT PROPERTIES
// ============================================
try {
    throw new Error("Sample error message");
} catch(err) {
    console.log("Error name:", err.name);      // Error type (TypeError, etc.)
    console.log("Error message:", err.message);   // Error description
    console.log("Error stack (first line):", err.stack.split('\n')[0]);     // Stack trace
    // Note: fileName and lineNumber are browser-specific
}




// ============================================
//             COMMON CHECKS & HANDLING
// ============================================


// NaN checking
console.log("isNaN('hello'):", isNaN("hello"));               // true (coerces to NaN)
console.log("Number.isNaN('hello'):", Number.isNaN("hello"));        // false (strict, preferred)



// Type checking
console.log("typeof undefined:", typeof undefined === "undefined");
console.log("typeof NaN:", typeof NaN === "number");       // Surprising but true
console.log("typeof null:", typeof null === "object");      // Historical bug



// Equality quirks
console.log("null == undefined:", null == undefined);             // true
console.log("null === undefined:", null === undefined);            // false
console.log("NaN == NaN:", NaN == NaN);                    // false
console.log("NaN === NaN:", NaN === NaN);                   // false



// Coercion results
console.log("Number(null):", Number(null));                  // 0
console.log("Number(undefined):", Number(undefined));             // NaN
console.log('Number("123"):', Number("123"));                 // 123
console.log('Number("abc"):', Number("abc"));                 // NaN





// ============================================
//      BASIC ERROR HANDLING (Safe Example)
// ============================================
try {
    // Safe example - won't crash
    console.log("Trying safe operation...");
} catch(error) {
    // Handle specific error types
    if (error instanceof TypeError) {
        console.log("Type error:", error.message);
    } else if (error instanceof ReferenceError) {
        console.log("Reference error:", error.message);
    } else {
        console.log("Unknown error:", error);
    }
} finally {
    console.log("Finally block executed");
}




// ============================================
//           QUICK REFERENCE TABLE
// ============================================
console.log(`
=============================================================
            QUICK REFERENCE TABLE
=============================================================
| Value             | Type        | Meaning                  |
|-------------------|-------------|--------------------------|
| NaN               | 'number'    | Invalid number           |
| undefined         | 'undefined' | No value assigned        |
| null              | 'object'    | Intentional no value     |
|                   |             |                          |
|                   |             |                          |  
| Error Type        | When Thrown | Common Cause             |
|-------------------|-------------|--------------------------|
| TypeError         | Wrong type  | null.property, "str"()   |
| ReferenceError    | No variable | undeclared variable      |
| SyntaxError       | Bad syntax  | JSON.parse('{bad}')      |
| RangeError        | Out of range| new Array(-1)            |
| URIError          | Bad URI     | decodeURIComponent('%')  |
=============================================================
`);





// ============================================
//    SAFE ERROR DEMONSTRATION (Won't crash)
// ============================================

console.log("\n=== Safe Error Demonstrations ===");



// Demonstrating errors without crashing
try {
    // TypeError example
    null.property;
} catch (e) {
    console.log("Caught TypeError:", e.message);
}




try {
    // ReferenceError example  
    console.log(neverDeclared);
} catch (e) {
    console.log("Caught ReferenceError:", e.message);
}




try {
    // RangeError example
    new Array(-1);
} catch (e) {
    console.log("Caught RangeError:", e.message);
}



try {
    // URIError example
    decodeURIComponent('%');
} catch (e) {
    console.log("Caught URIError:", e.message);
}



// WARNING: Lines above with "UNCOMMENT TO SEE ERROR" will crash if uncommented
// They're commented out so the rest of the script can run normally




</script>
</body>
</html>
